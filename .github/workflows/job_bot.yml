name: Ultimate Job Hunting ATS — Automated Pipeline

on:
  schedule:
    - cron: "0 * * * *"      # Every hour - Job scraping (24x per day)
    - cron: "30 9 * * *"     # Daily at 9:30 AM - Daily summary (1x per day)
    - cron: "0 10,18 * * *"  # At 10 AM and 6 PM - Expiry reminders (2x per day)
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Lint with Ruff
        run: ruff check app/ tests/ || true
        continue-on-error: true

      - name: Type check with MyPy
        run: mypy app/ --ignore-missing-imports || true
        continue-on-error: true

  # ─── Tests ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_job_hunting_ats.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-min-32-chars-here!!
          JWT_SECRET_KEY: test-jwt-secret-key-32-chars-min!!
          DEBUG: "true"
          PRIMARY_AI_PROVIDER: gemini
        run: pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── Scraper Job (LinkedIn + Indeed + Dealls) ─────────────────────
  scrape:
    name: Run Scraper (LinkedIn + Indeed + Dealls)
    runs-on: ubuntu-latest
    needs: test
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Download previous database
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: job_bot.yml
          name: job-database
          path: .
          if_no_artifact_found: ignore

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Database
        run: |
          echo "Setting up database..."
          python scripts/run_migrations.py
        continue-on-error: false

      - name: Cleanup Duplicate URLs (one-time migration)
        env:
          DATABASE_URL: sqlite+aiosqlite:///./job_hunting_ats.db
        run: |
          echo "Normalizing existing job URLs (strip LinkedIn/Indeed tracking params)..."
          python -c "
          import sqlite3
          from urllib.parse import urlparse, urlencode, parse_qs

          def normalize(url):
              if not url:
                  return url
              url = url.strip()
              linkedin_params = {'position','pageNum','refId','trackingId','trk','lipi','lici','currentJobId','eBP','recommendedFlavor','savedSearchId'}
              indeed_params = {'fclid','from','utm_source','utm_medium','utm_campaign','vjk','advn','sjdu'}
              try:
                  parsed = urlparse(url)
                  host = parsed.hostname or ''
                  if 'linkedin.com' in host: strip = linkedin_params
                  elif 'indeed.com' in host: strip = indeed_params
                  else: return url
                  qp = parse_qs(parsed.query, keep_blank_values=True)
                  cp = {k:v for k,v in qp.items() if k not in strip}
                  cq = urlencode(cp, doseq=True) if cp else ''
                  return parsed._replace(query=cq, fragment='').geturl()
              except: return url

          conn = sqlite3.connect('job_hunting_ats.db')
          cur = conn.cursor()
          cur.execute('SELECT id, job_url, created_at FROM jobs ORDER BY created_at ASC')
          rows = cur.fetchall()
          seen = {}
          to_update = []
          to_delete = []
          for jid, jurl, cat in rows:
              n = normalize(jurl)
              if n in seen:
                  to_delete.append(jid)
              else:
                  seen[n] = jid
                  if n != jurl:
                      to_update.append((jid, n))
          for jid, nurl in to_update:
              try: cur.execute('UPDATE jobs SET job_url=? WHERE id=?', (nurl, jid))
              except: to_delete.append(jid)
          if to_delete:
              ph = ','.join('?' * len(to_delete))
              for t in ['ai_analyses','applications','application_tracking']:
                  try: cur.execute(f'DELETE FROM {t} WHERE job_id IN ({ph})', to_delete)
                  except: pass
              cur.execute(f'DELETE FROM jobs WHERE id IN ({ph})', to_delete)
          conn.commit()
          cur.execute('SELECT COUNT(*) FROM jobs')
          print(f'DB cleanup: updated {len(to_update)} URLs, removed {len(to_delete)} duplicates, {cur.fetchone()[0]} jobs remaining')
          conn.close()
          " || echo "URL cleanup completed (no action needed)"
        continue-on-error: true

      - name: Run Job Finder (LinkedIn + Indeed + Dealls → Telegram)
        id: job_finder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTICAPTCHA_API_KEY: ${{ secrets.ANTICAPTCHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DATABASE_URL: sqlite+aiosqlite:///./job_hunting_ats.db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          OUTPUT_DIR: ./outputs
        run: |
          mkdir -p outputs/json outputs/csv outputs/reports outputs/artifacts
          echo "Starting job finder (LinkedIn + Indeed + Dealls + LinkedIn Posts)..."
          python scripts/run_job_finder_optimized.py || echo "Job finder completed with warnings"
        continue-on-error: true

      - name: Notify Job Finder Error
        if: failure() && steps.job_finder.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python scripts/notify_error.py "Job Finder" "Job finder script failed in GitHub Actions"
        continue-on-error: true

      - name: Send Daily Summary
        id: daily_summary
        if: github.event.schedule == '30 9 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DATABASE_URL: sqlite+aiosqlite:///./job_hunting_ats.db
        run: |
          echo "Sending daily summary..."
          python scripts/send_daily_summary.py || echo "Daily summary completed with warnings"
        continue-on-error: true

      - name: Check Expiring Jobs
        id: expiring_jobs
        if: github.event.schedule == '0 10,18 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DATABASE_URL: sqlite+aiosqlite:///./job_hunting_ats.db
        run: |
          echo "Checking expiring jobs..."
          python scripts/check_expiring_jobs.py || echo "Expiry check completed with warnings"
        continue-on-error: true

      - name: Generate Report
        run: |
          echo "Generating report..."
          python scripts/generate_report.py || echo "Report generation completed with warnings"
        continue-on-error: true
      
      - name: Create summary file
        run: |
          echo "Workflow completed at $(date)" > outputs/workflow_summary.txt
          echo "Database: job_hunting_ats.db" >> outputs/workflow_summary.txt
          echo "Platforms: LinkedIn, Indeed, Dealls" >> outputs/workflow_summary.txt
          ls -la outputs/ >> outputs/workflow_summary.txt || true
          if [ -f job_hunting_ats.db ]; then
            echo "Database size: $(du -h job_hunting_ats.db | cut -f1)" >> outputs/workflow_summary.txt
            python -c "import sqlite3; c=sqlite3.connect('job_hunting_ats.db'); r=c.execute('SELECT source_platform, COUNT(*) FROM jobs GROUP BY source_platform').fetchall(); print('Jobs by platform:'); [print(f'  {p}: {n}') for p,n in r]; c.close()" >> outputs/workflow_summary.txt || true
          fi
        continue-on-error: true

      - name: Upload Database (for next run)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-database
          path: job_hunting_ats.db
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ats-outputs-${{ github.run_number }}
          path: outputs/
          retention-days: 30
          if-no-files-found: warn
