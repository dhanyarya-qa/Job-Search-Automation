version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ats_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: job_hunting_ats
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d job_hunting_ats"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ats_network

  # ─── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ats_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ats_network

  # ─── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ats_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ats_user:ats_password@db:5432/job_hunting_ats
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ats_network

  # ─── Streamlit Dashboard ──────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: ats_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      FASTAPI_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - ats_network

  # ─── Celery Worker ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ats_worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ats_user:ats_password@db:5432/job_hunting_ats
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ats_network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ats_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - dashboard
    networks:
      - ats_network

volumes:
  postgres_data:
  redis_data:

networks:
  ats_network:
    driver: bridge
